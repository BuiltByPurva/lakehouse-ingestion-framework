name: Deploy State Machine for Orchestration

on:
  push:
    branches:
      - master


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack for State Machine
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/orch-elt-lakehouse-step-function-cfn.yml \
            --stack-name sfn-for-ingestion \
            --parameter-overrides file://orchestration_parameters/dev-lakehouse-orch-step-function-parameters.json \
            # --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
